<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML常见文本</title>
  </head>
  <body>
    <h1>00</h1>
    <h2>00</h2>
    <h3>00</h3>
    <h4>00</h4>
    <h5>00</h5>
    <h6>00</h6>
    <p>
      更改文本样式:
      <b>粗体</b>
      <i>斜体</i>
      <u>下划线</u>
      <s>删除线</s>
    </p>
    <ul>
      <li>无序列表项1</li>
      <li>无序列表项2</li>
      <li>无序列表项3</li>
    </ul>
    <ol>
      <li>有序列表项1</li>
      <li>有序列表项2</li>
      <li>有序列表项3</li>
    </ol>
    <table border="1">
      <tr>
        <th>表头1</th>
        <th>表头2</th>
        <th>表头3</th>
      </tr>
      <tr>
        <td>单元格1</td>
        <td>单元格2</td>
        <td>单元格3</td>
      </tr>
      <tr>
        <td>单元格4</td>
        <td>单元格5</td>
        <td>单元格6</td>
      </tr>
  </body>
</html>
