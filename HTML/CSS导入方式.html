<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS导入方式</title>
    <style>
      body {
        font-family: "Roboto", sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #f0f0f0;
      }

      h1 {
        color: #333;
      }

      p {
        color: #a05d5d;
        font-size: 30px;
        line-height: 2;
      }
    </style>
  </head>
  <body>
    <p>
      CSS（层叠样式表）是一种用于描述HTML文档外观和格式的语言。它可以通过多种方式导入到HTML文档中，以下是常见的CSS导入方式：
    </p>
    <h1>1</h1>
    <h2 style="color: #f98989">2</h2>
    <h3>3</h3>
    <h4>4</h4>
  </body>
</html>
