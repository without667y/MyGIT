<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>zzyh的个人主页</title>
    <style>
      body {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div style="background-color: #676767; text-align: center; padding: 40px">
      <img
        src="https://example.com/avatar.jpg"
        alt="zzyh"
        style="width: 80px; height: 80px; border-radius: 50%"
      />
    </div>
    <div
      style="
        max-width: 800px;
        margin: 30px auto;
        padding: 15px;
        line-height: 1.7;
        color: #333;
      "
    >
      <p
        style="
          font-size: 18px;
          font-weight: bold;
          margin-bottom: 20px;
          text-align: center;
        "
      >
        这是我的个人主页，欢迎来到我的世界！我喜欢编程、游戏和美食。在这里，我会分享我的生活点滴和一些有趣的故事。希望你能喜欢我的博客，和我一起探索这个精彩的世界！
      </p>
    </div>

    <div
      style="
        background-color: #dbdbdb;
        text-align: center;
        padding: 40px;
        font-size: 12px;
      "
    >
      <p>我的网站</p>
      <a
        href="https://example.com"
        style="color: #942222; text-decoration: none"
        >友情链接</a
      >
    </div>
  </body>
</html>
